<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - FitLife Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: url("{{ url_for('static', filename='dark.jpg') }}") no-repeat center center fixed;
      background-size: cover;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: -1;
    }

    .auth-card {
      width: 100%;
      max-width: 400px;
      padding: 3rem;
      position: relative;
      overflow: hidden;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .input-group {
      position: relative;
      margin-bottom: 1.5rem;
    }

    .input-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--primary);
      z-index: 10;
    }

    .form-control {
      padding-left: 45px;
      background: rgba(0, 0, 0, 0.3);
      border-color: rgba(255, 255, 255, 0.1);
    }

    .flash-message {
      padding: 10px;
      border-radius: 8px;
      background: rgba(255, 69, 0, 0.2);
      border: 1px solid var(--primary);
      color: white;
      text-align: center;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
  <div class="glass-panel auth-card fade-in">
    <div class="auth-header">
      <i class="fas fa-dumbbell fa-3x text-primary mb-3"></i>
      <h2>Welcome Back</h2>
      <p class="text-muted">Login to access your personalized plan</p>
    </div>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    {% for message in messages %}
    <div class="flash-message">{{ message }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    {% if msg %}
    <div class="flash-message">{{ msg }}</div>
    {% endif %}

    <form action="{{ url_for('login') }}" method="post">
      <div class="input-group">
        <i class="fas fa-user input-icon"></i>
        <input type="text" class="form-control" name="username" placeholder="Username" required>
      </div>

      <div class="input-group">
        <i class="fas fa-lock input-icon"></i>
        <input type="password" class="form-control" name="password" placeholder="Password" required>
      </div>

      <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>

      <div class="text-center">
        <p class="text-muted mb-0">Don't have an account? <a href="{{ url_for('register') }}"
            class="text-primary text-decoration-none">Register here</a></p>
      </div>
    </form>
  </div>

  <script src="{{ url_for('static', filename='animations.js') }}"></script>
</body>

</html>
